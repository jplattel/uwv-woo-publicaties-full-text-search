name: Daily Woo PDF crawl

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: Number of overview pages to fetch
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-nld poppler-utils

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run crawler
        run: uv run python -m src.main --max-pages "${{ github.event.inputs.max_pages || '1' }}"

      - name: Commit and push changes
        run: |
          if git diff --quiet data; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore: update Woo PDF extracts"
          git push
